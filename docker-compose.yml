version: '3.9'
services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - minio
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ophtha
      POSTGRES_USER: ophtha
      POSTGRES_PASSWORD: ophtha
    volumes:
      - db-data:/var/lib/postgresql/data
  vector-db:
    image: redis:7-alpine
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
volumes:
  db-data:
  minio-data:
